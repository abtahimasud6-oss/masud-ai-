<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masud AI</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: white; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 15px; max-width: 70%; word-wrap: break-word; }
        .user-message { background-color: #3f51b5; align-self: flex-end; }
        .bot-message { background-color: #212121; align-self: flex-start; border: 1px solid #333; }
        .input-container { padding: 15px; background-color: #1e1e1e; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #333; background-color: #121212; color: white; outline: none; }
        button { padding: 12px 25px; border-radius: 25px; border: none; background-color: #3f51b5; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #303f9f; }
        .typing { display: none; background-color: #212121; align-self: flex-start; padding: 10px 15px; border-radius: 15px; color: #aaa; }
    </style>
</head>
<body>

    <div class="chat-container" id="chat-box">
        <div class="message bot-message">Hello! আমি মাসুদ এআই (Masud AI)। আমাকে তৈরি করেছে আবতাহী মাসুদ ইয়াফি (Abtahi Masud YAFI)। আপনাকে স্বাগতম! কিভাবে সাহায্য করতে পারি?</div>
    </div>

    <div class="typing" id="typing-indicator">মাসুদ এআই লিখছে...</div>

    <div class="input-container">
        <input type="text" id="user-input" placeholder="মেসেজ লিখো..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">পাঠাও</button>
    </div>

    <script>
        function sendMessage() {
            const inputField = document.getElementById("user-input");
            const message = inputField.value.trim();
            if (!message) return;

            appendMessage(message, "user-message");
            inputField.value = "";

            const typingIndicator = document.getElementById("typing-indicator");
            typingIndicator.style.display = "block";

            fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: message })
            })
            .then(res => res.json())
            .then(data => {
                typingIndicator.style.display = "none";
                if (data.response) {
                    appendMessage(data.response, "bot-message");
                } else if (data.error) {
                    appendMessage("Error: " + data.error, "bot-message");
                } else {
                    appendMessage("দুঃখিত, কোনো রেসপন্স পাওয়া যায়নি।", "bot-message");
                }
            })
            .catch(err => {
                typingIndicator.style.display = "none";
                appendMessage("সার্ভারের সাথে কানেক্ট করা যাচ্ছে না।", "bot-message");
            });
        }

        function appendMessage(text, className) {
            const chatBox = document.getElementById("chat-box");
            const msgDiv = document.createElement("div");
            msgDiv.className = `message ${className}`;
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
